name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 black pytest-cov

    - name: Lint with flake8
      run: |
        flake8 backend --count --select=E9,F63,F7,F82 --show-source --statistics || true
        flake8 backend --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics || true

    - name: Run backend tests
      run: |
        pytest tests/ -v --tb=short --disable-warnings -m unit

  frontend-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'

    - name: Install frontend dependencies
      working-directory: ./frontend
      run: npm ci

    - name: Build frontend
      working-directory: ./frontend
      run: npm run build

    - name: Verify build output
      working-directory: ./frontend
      run: |
        if [ -d "dist" ]; then
          echo "✓ Frontend build successful"
          ls -lah dist/
        else
          echo "✗ Frontend build failed"
          exit 1
        fi

  status-check:
    needs: [backend-tests, frontend-build]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Check test results
      run: |
        if [ "${{ needs.backend-tests.result }}" == "failure" ] || [ "${{ needs.frontend-build.result }}" == "failure" ]; then
          echo "❌ CI Pipeline Failed"
          exit 1
        fi
        echo "✅ CI Pipeline Passed"

    - name: Create success badge
      if: success()
      run: echo "🎉 All checks passed!"
