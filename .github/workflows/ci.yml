name: Run Unit Tests

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Run unit tests with coverage
      run: |
        pytest tests/ -m unit --cov=backend --cov-report=xml --cov-report=term-missing -v --ignore=tests/test_admin_applications_crud.py --ignore=tests/test_admin_crud.py --ignore=tests/test_admin_jobs.py --ignore=tests/test_admin_users.py