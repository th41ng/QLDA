[pytest]
# Pytest configuration for unit testing
# Tests run with NO real database - all mocked

testpaths = tests/unit
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Coverage options
addopts = 
    -v
    --strict-markers
    --disable-warnings
    --tb=short

# Markers
markers =
    unit: Unit test (fast, mocked, no DB)
    integration: Integration test (requires services)
    slow: Slow tests
    requires_db: Tests that need real database (not recommended)

# Timeout
timeout = 5

# Logging
log_cli = false
log_level = INFO
