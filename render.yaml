services:
  - type: web
    name: qlda-backend
    env: python
    plan: free
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -b 0.0.0.0:$PORT backend.run:app
    healthCheckPath: /
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: qlda-postgres
          property: connectionString
      - key: FRONTEND_URL
        value: https://qlda-frontend.onrender.com
      - key: MAIL_SERVER
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USE_TLS
        value: "true"

  - type: static
    name: qlda-frontend
    plan: free
    region: singapore
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://qlda-backend.onrender.com

  - type: postgres
    name: qlda-postgres
    plan: free
    region: singapore
    databaseName: qlda_db
    username: qlda_user